# Runs pixi-lock against environment.yml for reproducible environments
# Runs on any opened PR
name: PixiLock

on:
  repository_dispatch:
    types: [pixilock-command]

permissions: {}

jobs:
  pixilock:
    strategy:
      fail-fast: false
      matrix:
        IMAGE: [base-notebook, pangeo-notebook, pytorch-notebook]
    name: ${{ matrix.IMAGE }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.DATALABSBOT_TOKEN }}
          # These lines are critical, otherwise Pangeo-bot pushes changes directly to master from PRs!
          repository: ${{ github.event.client_payload.pull_request.head.repo.full_name }}
          ref: ${{ github.event.client_payload.pull_request.head.ref }}
          persist-credentials: false
      - name: Install pixi 
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
            pixi-version: v0.67.0
            cache: true
      - name: Run pixi lock ${{ matrix.IMAGE }}
        timeout-minutes: 120
        run: |
          rm -rf notebook ; \
          pixi init notebook ; \
          cd notebook ; \
          pixi import ../base-notebook/environment.yml --format conda-env; \
          pixi import ../pangeo-notebook/environment.yml --format conda-env; \
          pixi import ../pytorch-notebook/environment.yml --format conda-env; \
          pixi workspace environment add base-notebook --feature base-notebook --force; \
          pixi workspace environment add pangeo-notebook --feature base-notebook --feature pangeo-notebook --force; \
          pixi workspace environment add pytorch-notebook --feature base-notebook --feature pangeo-notebook --feature pytorch-notebook --force; \
          pixi lock --environment ${{ matrix.IMAGE }}
          cd ../${{ matrix.IMAGE }}
          ../generate-packages-list.py ../notebook/pixi.lock --environment=${{ matrix.IMAGE }} > packages.txt

      - name: Upload lockfiles
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.image }}
          path: ${{ matrix.image }}

  # Each job will commit files, so we know it succeeds based on commits
  commit-lockfiles:
    needs: pixilock
    runs-on: ubuntu-slim
    permissions:
      contents: write # for Git to git push
      pull-requests: write # for peter-evans/create-or-update-comment to create PR reaction
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.DATALABSBOT_TOKEN }}
          # These lines are critical, otherwise Pangeo-bot pushes changes directly to master from PRs!
          repository: ${{ github.event.client_payload.pull_request.head.repo.full_name }}
          ref: ${{ github.event.client_payload.pull_request.head.ref }}
          persist-credentials: true

      # Download all artifacts from previous matrix job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Commit pixilock files to PR
        run: |
          git config --global user.name 'datalabs-bot'
          git config --global user.email 'datalabs-bot@users.noreply.github.com'
          git status
          git add notebook/pixi.lock notebook/pixi.toml */packages.txt
          git commit -m "[pixilock-command] autogenerated pixi-lock files"
          git push

      - name: Add reaction
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reactions: hooray
