# Any PR opened, build images and run tests
name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DOCKER_ORG: cnes
  GITHUB_SHA: ${{ github.sha }}
  GITHUB_REF: ${{ github.ref }}

permissions: {}

jobs:
  matrix-build:
    strategy:
      fail-fast: false
      matrix:
        IMAGE: [base-notebook, pangeo-notebook, pytorch-notebook]
    name: ${{ matrix.IMAGE }}
    runs-on: ubuntu-latest
    services:
      # https://github.com/docker/build-push-action/blob/master/docs/advanced/local-registry.md#local-registry
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    # https://github.com/actions/runner-images/issues/2840#issuecomment-790492173
    - name: Free up disk space
      run: |
        df -h
        docker image ls
        sudo apt clean
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
        df -h

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      with:
        driver-opts: network=host

    - name: Build base-image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: base-image
        platforms: linux/amd64
        tags: localhost:5000/cnes/base-image:PR
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Prepare pixi env
      run: |
        pwd
        ls -la
        mkdir -p ${{ matrix.IMAGE }}/srv/pixi
        cp -r notebook  ${{ matrix.IMAGE }}/.
        chmod 755 -R ${{ matrix.IMAGE }}/srv
        echo ${{ matrix.IMAGE }} > ${{ matrix.IMAGE }}/vre_name

    - name: Build Only
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ matrix.IMAGE }}
        platforms: linux/amd64
        push: true
        tags: localhost:5000/${{env.DOCKER_ORG}}/${{ matrix.IMAGE }}:PR
        build-args: PANGEO_BASE_IMAGE_TAG=PR
        build-contexts: |
          cnes/base-image:PR=docker-image://localhost:5000/cnes/base-image:PR

    #- name: List Conda Packages
    #  run: |
    #    docker run localhost:5000/${DOCKER_ORG}/${{ matrix.IMAGE }}:PR conda list --export

    - name: Report Image Size
      run: |
        docker image ls

    - name: Test Image
      run: |
        docker run -u 1000 -w /srv/test -v $PWD:/srv/test localhost:5000/${DOCKER_ORG}/${{ matrix.IMAGE }}:PR ./run_tests.sh ${{ matrix.IMAGE }}
